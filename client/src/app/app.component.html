<div class="app-container">
    <div class="toolbar">
        <app-log-toolbar [isPaused]="isPaused" [filterText]="filterText" [isChartVisible]="isChartVisible"
            [isDarkMode]="themeService.isDarkMode" (pauseToggled)="onPauseToggled()" (clearClicked)="onClear()"
            (filterChanged)="onFilterChanged($event)" (chartVisibilityToggled)="onChartVisibilityToggled()"
            (themeToggled)="toggleTheme()">
        </app-log-toolbar>
    </div>

    <div class="layout" [class.chart-collapsed]="!isChartVisible">
        <div class="chart-section">
            <app-log-chart></app-log-chart>
        </div>
        <div class="table-section">
            <app-log-viewer #logViewer [filterText]="filterText"></app-log-viewer>
        </div>
    </div>
</div>
