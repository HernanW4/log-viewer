<div class="chart-container">
  <ngx-charts-bar-vertical
    [results]="logFrequencies"
    [scheme]="colorScheme"
    [xAxis]="showXAxis"
    [yAxis]="showYAxis"
    [yScaleMax]="yScaleMax"
    [barPadding]="barPadding"
    [legend]="showLegend"
    [gradient]="gradient"
    [showXAxisLabel]="showXAxisLabel"
    [showYAxisLabel]="showYAxisLabel">
  </ngx-charts-bar-vertical>
</div>
